; PlatformIO 项目配置 — SDEQ for M5Stack Tab5 (ESP32-P4)
;
; 首次使用前：
;   1. 在 VSCode 中安装 PlatformIO IDE 扩展
;   2. 打开此目录，PlatformIO 会自动下载依赖
;
; 如果提示找不到 board "m5stack-tab5"，请执行：
;   pio boards espressif32 | grep -i tab5
; 若仍无结果，将 board 改为 esp32p4dev 并取消注释下方 board_build 一节

[platformio]
default_envs = m5stack-tab5
; .ino 文件位于项目根目录，无需移入 src/
src_dir = .

; ─────────────────────────────────────────────────────────────────
[env:m5stack-tab5]
platform  = espressif32
board     = m5stack-tab5
framework = arduino

; ── 依赖库 ────────────────────────────────────────────────────────
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    m5stack/M5GFX    @ ^0.2.8

; ── 串口监视器 ────────────────────────────────────────────────────
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ── 上传速度 ──────────────────────────────────────────────────────
upload_speed = 921600

; ── 编译标志 ──────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM        ; Tab5 配备 32MB PSRAM，供大尺寸 Canvas 使用

; ─────────────────────────────────────────────────────────────────
; 备用配置：如果 m5stack-tab5 board 不可用，改用通用 ESP32-P4 board
; [env:esp32p4-fallback]
; platform  = espressif32
; board     = esp32p4dev
; framework = arduino
; board_build.mcu            = esp32p4
; board_build.f_cpu          = 400000000L
; board_build.flash_mode     = qio
; board_build.flash_freq     = 80m
; lib_deps =
;     m5stack/M5Unified @ ^0.2.7
;     m5stack/M5GFX    @ ^0.2.8
; monitor_speed = 115200
; upload_speed  = 921600
; build_flags =
;     -DCORE_DEBUG_LEVEL=0
;     -DBOARD_HAS_PSRAM
